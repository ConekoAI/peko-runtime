# MCP Memory Server Configuration
# 
# This configuration demonstrates reserved parameter injection for MCP tools.
# The memory server receives agent_id and session_id automatically injected
# by Pekobot at runtime, enabling agent-isolated memory storage.

[[server]]
name = "memory"
transport = "stdio"
command = "node"
args = ["examples/mcp-memory-server/server.js"]
auto_start = true

# Reserved parameters - injected by Pekobot, hidden from LLM
# These are automatically added to tool calls based on runtime context
[server.reserved_parameters]
agent_id = { source = "runtime", field = "agent_id" }
session_id = { source = "runtime", field = "session_id" }

# You can also use other sources:
# [server.reserved_parameters]
# agent_id = { source = "runtime", field = "agent_id" }
# api_key = { source = "env", var = "MEMORY_API_KEY" }
# environment = { source = "static", value = "production" }
