id: "identity_tool"
name: "identity_tool"
version: "1.0.0"
description: "Echo back the injected identity parameters to verify context injection"
extension_type: "universal-tool"
llm_description: "Use this tool to verify that identity parameters (agent_id, session_id) are being injected. The tool will return the injected values."
parameters:
  type: object
  properties:
    message:
      type: string
      description: "Optional message to echo back"
reserved_parameters:
  session_id:
    source: "runtime"
    field: "session_id"
  agent_id:
    source: "runtime"
    field: "agent_id"
  run_id:
    source: "runtime"
    field: "run_id"
  workspace:
    source: "runtime"
    field: "workspace"
protocol:
  version: "2.0"
  transport: "stdio"
  supports_streaming: false
