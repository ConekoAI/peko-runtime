<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pekobot Web UI</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 20px 0;
            margin-bottom: 30px;
        }
        
        header h1 {
            color: #58a6ff;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        header h1::before {
            content: "🐱";
        }
        
        .status-bar {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 14px;
            color: #8b949e;
        }
        
        .status-bar span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .status-bar .online {
            color: #3fb950;
        }
        
        .status-bar .offline {
            color: #f85149;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
        }
        
        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
        
        .sidebar {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
        }
        
        .sidebar h2 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #f0f6fc;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .instance-list {
            list-style: none;
        }
        
        .instance-item {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .instance-item:hover {
            border-color: #58a6ff;
            background: #1c2128;
        }
        
        .instance-item.active {
            border-color: #58a6ff;
            background: #1c2128;
        }
        
        .instance-item .name {
            font-weight: 600;
            color: #f0f6fc;
            margin-bottom: 4px;
        }
        
        .instance-item .meta {
            font-size: 12px;
            color: #8b949e;
            display: flex;
            gap: 10px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .status-running { background: #3fb950; }
        .status-stopped { background: #8b949e; }
        .status-error { background: #f85149; }
        .status-starting { background: #d29922; }
        
        .main-content {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            min-height: 600px;
        }
        
        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #30363d;
        }
        
        .chat-header h3 {
            font-size: 18px;
            color: #f0f6fc;
        }
        
        .chat-header .subtitle {
            font-size: 13px;
            color: #8b949e;
            margin-top: 4px;
        }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            max-height: 500px;
        }
        
        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
        }
        
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .message.user .message-avatar {
            background: #1f6feb;
        }
        
        .message.assistant .message-avatar {
            background: #238636;
        }
        
        .message-content {
            flex: 1;
        }
        
        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        
        .message-author {
            font-weight: 600;
            font-size: 14px;
        }
        
        .message.user .message-author {
            color: #58a6ff;
        }
        
        .message.assistant .message-author {
            color: #3fb950;
        }
        
        .message-time {
            font-size: 12px;
            color: #6e7681;
        }
        
        .message-text {
            color: #c9d1d9;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        
        .chat-input-area {
            padding: 20px;
            border-top: 1px solid #30363d;
        }
        
        .input-container {
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px 16px;
            color: #c9d1d9;
            font-size: 14px;
            resize: none;
            min-height: 48px;
            max-height: 120px;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: #58a6ff;
        }
        
        .send-button {
            background: #238636;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .send-button:hover {
            background: #2ea043;
        }
        
        .send-button:disabled {
            background: #30363d;
            cursor: not-allowed;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8b949e;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .refresh-button {
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 6px 12px;
            color: #c9d1d9;
            font-size: 12px;
            cursor: pointer;
            margin-bottom: 15px;
            width: 100%;
        }
        
        .refresh-button:hover {
            background: #30363d;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }
        
        .error {
            background: #f851491a;
            border: 1px solid #f85149;
            border-radius: 8px;
            padding: 16px;
            color: #f85149;
            margin: 20px;
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #0d1117;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Pekobot</h1>
            <div class="status-bar">
                <span id="daemon-status"><span class="status-dot offline"></span> Checking...</span>
                <span>API: <code id="api-version">-</code></span>
                <span>Instances: <strong id="instance-count">-</strong></span>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="grid">
            <aside class="sidebar">
                <button class="refresh-button" onclick="loadInstances()">🔄 Refresh</button>
                <h2>Instances</h2>
                <ul class="instance-list" id="instance-list">
                    <li class="loading">Loading...</li>
                </ul>
            </aside>

            <main class="main-content">
                <div class="chat-header">
                    <h3 id="chat-title">Select an instance</h3>
                    <div class="subtitle" id="chat-subtitle">Choose an instance from the sidebar to start chatting</div>
                </div>
                
                <div class="chat-messages" id="chat-messages">
                    <div class="empty-state">
                        <div class="empty-state-icon">🐱</div>
                        <p>Welcome to Pekobot Web UI</p>
                        <p style="margin-top: 10px; font-size: 14px;">Select an instance from the sidebar to start chatting</p>
                    </div>
                </div>
                
                <div class="chat-input-area">
                    <div class="input-container">
                        <textarea 
                            class="chat-input" 
                            id="message-input" 
                            placeholder="Type your message..."
                            rows="1"
                            disabled
                        ></textarea>
                        <button class="send-button" id="send-button" onclick="sendMessage()" disabled>Send</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let selectedInstance = null;
        let messageHistory = [];

        // Auto-resize textarea
        const textarea = document.getElementById('message-input');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Send on Enter (Shift+Enter for new line)
        textarea.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function loadStatus() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                
                const statusEl = document.getElementById('daemon-status');
                if (data.status === 'ok') {
                    statusEl.innerHTML = '<span class="status-dot online"></span> Online';
                } else {
                    statusEl.innerHTML = '<span class="status-dot offline"></span> Degraded';
                }
                
                document.getElementById('instance-count').textContent = data.instance_count || 0;
            } catch (error) {
                document.getElementById('daemon-status').innerHTML = '<span class="status-dot offline"></span> Offline';
                document.getElementById('instance-count').textContent = '-';
            }
            
            try {
                const response = await fetch(`${API_BASE}/info`);
                const data = await response.json();
                document.getElementById('api-version').textContent = data.api_version;
            } catch (error) {
                document.getElementById('api-version').textContent = '?';
            }
        }

        async function loadInstances() {
            const listEl = document.getElementById('instance-list');
            listEl.innerHTML = '<li class="loading">Loading...</li>';
            
            try {
                const response = await fetch(`${API_BASE}/agents`);
                const data = await response.json();
                
                if (!data.items || data.items.length === 0) {
                    listEl.innerHTML = '<li class="loading">No instances</li>';
                    return;
                }
                
                listEl.innerHTML = '';
                data.items.forEach(instance => {
                    const li = document.createElement('li');
                    li.className = 'instance-item';
                    li.dataset.id = instance.id;
                    li.onclick = () => selectInstance(instance);
                    
                    const statusClass = `status-${instance.status}`;
                    
                    li.innerHTML = `
                        <div class="name">${escapeHtml(instance.name)}</div>
                        <div class="meta">
                            <span><span class="status-dot ${statusClass}"></span> ${instance.status}</span>
                            <span>${instance.image_ref.split(':')[0]}</span>
                        </div>
                    `;
                    
                    listEl.appendChild(li);
                });
            } catch (error) {
                listEl.innerHTML = `<li class="error">Failed to load: ${escapeHtml(error.message)}</li>`;
            }
        }

        function selectInstance(instance) {
            selectedInstance = instance;
            messageHistory = [];
            
            // Update UI
            document.querySelectorAll('.instance-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`.instance-item[data-id="${instance.id}"]`)?.classList.add('active');
            
            document.getElementById('chat-title').textContent = instance.name;
            document.getElementById('chat-subtitle').textContent = `ID: ${instance.id} | Status: ${instance.status} | Image: ${instance.image_ref}`;
            
            const messagesEl = document.getElementById('chat-messages');
            messagesEl.innerHTML = '';
            
            // Enable input
            document.getElementById('message-input').disabled = false;
            document.getElementById('send-button').disabled = false;
            
            // Load session history if there's an active session
            if (instance.active_session_id) {
                loadSessionHistory(instance.id, instance.active_session_id);
            }
        }

        async function loadSessionHistory(instanceId, sessionId) {
            try {
                const response = await fetch(`${API_BASE}/agents/${instanceId}/sessions/${sessionId}/history`);
                const data = await response.json();
                
                const messagesEl = document.getElementById('chat-messages');
                messagesEl.innerHTML = '';
                
                data.items.forEach(item => {
                    if (item.type === 'user.message' || item.type === 'assistant.message') {
                        addMessageToUI({
                            role: item.role,
                            content: item.content,
                            timestamp: item.created_at
                        });
                    }
                });
            } catch (error) {
                console.error('Failed to load history:', error);
            }
        }

        async function sendMessage() {
            if (!selectedInstance) return;
            
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (!message) return;
            
            // Add user message to UI
            addMessageToUI({
                role: 'user',
                content: message,
                timestamp: new Date().toISOString()
            });
            
            // Clear input
            input.value = '';
            input.style.height = 'auto';
            
            // Disable input while waiting
            input.disabled = true;
            document.getElementById('send-button').disabled = true;
            
            try {
                // For now, we use the SSE streaming endpoint
                // This is a simplified implementation
                const response = await fetch(`${API_BASE}/agents/${selectedInstance.id}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        session_id: selectedInstance.active_session_id
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                // For SSE streaming, we need to handle the stream
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let assistantMessage = '';
                let messageEl = null;
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;
                            
                            try {
                                const event = JSON.parse(data);
                                if (event.event === 'delta') {
                                    if (!messageEl) {
                                        messageEl = createMessageElement({
                                            role: 'assistant',
                                            content: '',
                                            timestamp: new Date().toISOString()
                                        });
                                    }
                                    assistantMessage += event.text || '';
                                    messageEl.querySelector('.message-text').textContent = assistantMessage;
                                } else if (event.event === 'done') {
                                    break;
                                }
                            } catch (e) {
                                // Ignore parse errors
                            }
                        }
                    }
                }
                
                if (!messageEl) {
                    // If no streaming response, show a placeholder
                    addMessageToUI({
                        role: 'assistant',
                        content: 'Response received (streaming display not fully implemented)',
                        timestamp: new Date().toISOString()
                    });
                }
                
            } catch (error) {
                addMessageToUI({
                    role: 'assistant',
                    content: `Error: ${error.message}`,
                    timestamp: new Date().toISOString()
                });
            } finally {
                input.disabled = false;
                document.getElementById('send-button').disabled = false;
                input.focus();
            }
        }

        function addMessageToUI(message) {
            const el = createMessageElement(message);
            document.getElementById('chat-messages').appendChild(el);
            el.scrollIntoView({ behavior: 'smooth' });
        }

        function createMessageElement(message) {
            const div = document.createElement('div');
            div.className = `message ${message.role}`;
            
            const time = new Date(message.timestamp).toLocaleTimeString();
            const avatar = message.role === 'user' ? '👤' : '🤖';
            const author = message.role === 'user' ? 'You' : 'Assistant';
            
            div.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                    <div class="message-header">
                        <span class="message-author">${author}</span>
                        <span class="message-time">${time}</span>
                    </div>
                    <div class="message-text">${escapeHtml(message.content)}</div>
                </div>
            `;
            
            return div;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        loadStatus();
        loadInstances();
        
        // Refresh status periodically
        setInterval(loadStatus, 30000);
    </script>
</body>
</html>
