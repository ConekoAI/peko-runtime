[package]
name = "pekobot"
version = "0.1.0"
edition = "2021"
authors = ["Pekora <peko@coneko.ai>"]
description = "Lightweight multi-agent runtime with optional Coneko network"
license = "MIT"
repository = "https://github.com/coneko/pekobot"

[features]
default = []  # Start with minimal core, no bundled tools

# On-demand tools (previously bundled)
bundled-tools = ["calendar", "document", "email", "expense", "inventory", "research", "social_media"]
calendar = []
document = []
email = []
expense = []
inventory = []
research = []
social_media = []

# Full build (for development or air-gapped environments)
full = ["bundled-tools"]

[dependencies]
# Async runtime
tokio = { version = "1.35", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# HTTP client
reqwest = { version = "0.11", features = ["json"] }

# CLI
clap = { version = "4.4", features = ["derive", "env"] }

# Crypto (ed25519)
ed25519-dalek = "2.1"
rand = "0.8"
base64 = "0.22"
blake3 = "1.5"
bs58 = "0.5"
sha2 = "0.10"

# SQLite
rusqlite = { version = "0.30", features = ["bundled"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Async traits
async-trait = "0.1"
futures = "0.3"

# Time
chrono = { version = "0.4", features = ["serde"] }
cron = "0.12"

# UUID
uuid = { version = "1.7", features = ["v4", "serde"] }

# Directories
dirs = "5.0"

# URL encoding
urlencoding = "2.1"

# Pattern matching for document parsing
regex = "1.10"

# Portable agent dependencies
tar = "0.4"
flate2 = "1.0"
aes-gcm = "0.10"
argon2 = "0.5"
hex = "0.4"
rpassword = "7.3"

# Secret manager dependencies
hkdf = "0.12"
keyring = "2.3"
secrecy = "0.10"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.10"
criterion = { version = "0.5", features = ["async_tokio"] }
axum = "0.7"
tower = "0.4"
tower-http = { version = "0.5", features = ["fs"] }

[[bin]]
name = "pekobot"
path = "src/main.rs"

[[bench]]
name = "performance_benchmarks"
harness = false
