# MCP Configuration for E2E Test
#
# This configuration demonstrates reserved parameter injection for MCP tools.
# The MCP server will receive agent_id and session_id automatically injected
# by Pekobot at runtime, enabling agent-isolated tool behavior.

[[server]]
name = "identity"
transport = "stdio"
command = "python"
# Path relative to this config file location
# When installed, config.toml and mcp_server.py are in the same directory
args = ["mcp_server.py"]
auto_start = true

# Reserved parameters - injected by Pekobot, hidden from LLM
# These are automatically added to tool calls based on runtime context
[server.reserved_parameters]
agent_id = { source = "runtime", field = "agent_id" }
session_id = { source = "runtime", field = "session_id" }

# Additional examples of reserved parameter sources:
# [server.reserved_parameters]
# agent_id = { source = "runtime", field = "agent_id" }
# api_key = { source = "env", var = "MCP_API_KEY" }
# environment = { source = "static", value = "e2e_test" }
