---
id: custom-compactor-test
name: Custom Compaction Test Extension
version: "1.0.0"
extension_type: general
description: |
  A test extension that registers session compaction hooks for E2E verification.
  Used by the ADR-022 E2E test suite (and the corresponding Rust
  tests/cli_compaction.rs::cli_compact_with_compaction_extension_installed
  migration) to verify extension hook wiring.
hooks:
  - point: session.compaction
    handler: custom_compaction_handler
  - point: session.compaction_post
    handler: post_compaction_handler
