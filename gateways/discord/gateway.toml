[plugin]
name = "discord"
type = "gateway"
version = "0.1.0"
description = "Discord gateway for Pekobot"
author = "Pekora"
api_version = "1.0.0"
min_pekobot_version = "0.1.0"

[capabilities]
provides = ["gateway.discord"]
requires = []

[binary]
linux_x64 = "https://pekohub.io/gateways/discord/0.1.0/discord_gateway_linux_x64.so"
linux_arm64 = "https://pekohub.io/gateways/discord/0.1.0/discord_gateway_linux_arm64.so"
macos_x64 = "https://pekohub.io/gateways/discord/0.1.0/discord_gateway_macos_x64.dylib"
macos_arm = "https://pekohub.io/gateways/discord/0.1.0/discord_gateway_macos_arm.dylib"
windows_x64 = "https://pekohub.io/gateways/discord/0.1.0/discord_gateway_windows_x64.dll"

[config]

[[config.required]]
name = "token"
field_type = "string"
description = "Discord bot token from Discord Developer Portal"
secret = true

[[config.optional]]
name = "default_channel"
field_type = "string"
description = "Default channel ID to use when none specified"
secret = false

[[config.optional]]
name = "rate_limit_per_user"
field_type = "number"
description = "Rate limit for this gateway instance (msgs/sec)"
default = 5.0
secret = false
