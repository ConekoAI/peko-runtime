services:
  # ── PekoHub Test Backend ─────────────────────────────────────────
  # Real Fastify app from pekohub/backend, swapped to PGlite +
  # in-process Map storage/search so the fixture has no external deps.
  # Image is pre-built by `make docker-build` (see Makefile) — compose
  # just runs it. Decoupling build from compose keeps path resolution
  # simple and identical in local + CI layouts.
  pekohub-test:
    image: peko/pekohub-test:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - JWT_SECRET=test-secret-key-that-is-32-chars-long!!
      - ALLOW_DEV_AUTH_BYPASS=true
      - GC_ENABLED=false
      - RATE_LIMIT_MAX=1000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - peko-test

  # ── Mock LLM Server ──────────────────────────────────────────────
  # For tunnel_e2e + Phase B cli_*.rs. Sends MiniMax-compatible SSE.
  # Image is pre-built by `make docker-build`.
  mock-llm:
    image: peko/mock-llm:latest
    ports:
      - "8080:8080"
    environment:
      - DEFAULT_RESPONSE=SUCCESS
    networks:
      - peko-test

networks:
  peko-test:
    driver: bridge
