name: Integration Tests (Containerized)

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'e2e_tests/**'
      - '.github/docker/**'
      - '.github/workflows/integration.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'e2e_tests/**'
      - '.github/docker/**'
      - '.github/workflows/integration.yml'
  schedule:
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Layer 1: Library Tests (fast, no Docker) ────────────────────────
  lib-tests:
    name: Library Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo test --lib

  # ── Layer 2: PekoHub Integration (registry + hub OCI) ───────────────
  pekohub-integration:
    name: PekoHub Integration (20 tests)
    runs-on: ubuntu-latest
    needs: lib-tests
    steps:
      - name: Checkout peko-runtime
        uses: actions/checkout@v4
        with:
          path: peko-runtime
      - name: Checkout pekohub
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/pekohub
          path: pekohub
      - uses: docker/setup-buildx-action@v3
      - name: Build pekohub test image
        run: |
          docker build -t peko/pekohub-test \
            -f peko-runtime/.github/docker/pekohub-test/Dockerfile pekohub
      - name: Start pekohub test server
        run: |
          docker run -d --name pekohub-test -p 3000:3000 peko/pekohub-test
          sleep 5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            peko-runtime/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('peko-runtime/**/Cargo.lock') }}
      - name: Run pekohub integration tests
        working-directory: peko-runtime
        run: cargo test --test pekohub_integration -- --ignored
        env:
          PEKOHUB_URL: http://localhost:3000

  # ── Layer 2: Tunnel Integration ─────────────────────────────────────
  tunnel-integration:
    name: Tunnel Integration (5 tests)
    runs-on: ubuntu-latest
    needs: [pekohub-integration]
    steps:
      - name: Checkout peko-runtime
        uses: actions/checkout@v4
        with:
          path: peko-runtime
      - name: Checkout pekohub
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/pekohub
          path: pekohub
      - uses: docker/setup-buildx-action@v3
      - name: Build and start pekohub
        run: |
          docker build -t peko/pekohub-test \
            -f peko-runtime/.github/docker/pekohub-test/Dockerfile pekohub
          docker run -d --name pekohub-test -p 3000:3000 peko/pekohub-test
          sleep 5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            peko-runtime/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('peko-runtime/**/Cargo.lock') }}
      - name: Run tunnel integration tests
        working-directory: peko-runtime
        run: cargo test --test tunnel_integration -- --ignored
        env:
          PEKOHUB_URL: http://localhost:3000

  # ── Layer 2: Packaging Integration ──────────────────────────────────
  packaging-integration:
    name: Packaging Integration (1 test)
    runs-on: ubuntu-latest
    needs: [pekohub-integration]
    steps:
      - name: Checkout peko-runtime
        uses: actions/checkout@v4
        with:
          path: peko-runtime
      - name: Checkout pekohub
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/pekohub
          path: pekohub
      - uses: docker/setup-buildx-action@v3
      - name: Build and start pekohub
        run: |
          docker build -t peko/pekohub-test \
            -f peko-runtime/.github/docker/pekohub-test/Dockerfile pekohub
          docker run -d --name pekohub-test -p 3000:3000 peko/pekohub-test
          sleep 5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            peko-runtime/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('peko-runtime/**/Cargo.lock') }}
      - name: Run packaging integration tests
        working-directory: peko-runtime
        run: cargo test --test packaging_integration -- --ignored
        env:
          PEKOHUB_URL: http://localhost:3000

  # ── Layer 3: Subagent Integration (pure Rust) ───────────────────────
  subagent-integration:
    name: Subagent Integration (13 tests)
    runs-on: ubuntu-latest
    needs: lib-tests
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run subagent integration tests
        run: cargo test --lib subagent_integration

  # ── Layer 3: Tunnel E2E (with mock LLM) ─────────────────────────────
  tunnel-e2e:
    name: Tunnel E2E (mock LLM)
    runs-on: ubuntu-latest
    needs: [tunnel-integration]
    steps:
      - name: Checkout peko-runtime
        uses: actions/checkout@v4
        with:
          path: peko-runtime
      - name: Checkout pekohub
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/pekohub
          path: pekohub
      - uses: docker/setup-buildx-action@v3
      - name: Build pekohub test image
        run: |
          docker build -t peko/pekohub-test \
            -f peko-runtime/.github/docker/pekohub-test/Dockerfile pekohub
      - name: Build mock LLM image
        run: |
          docker build -t peko/mock-llm \
            -f peko-runtime/.github/docker/mock-llm/Dockerfile peko-runtime/.github/docker/mock-llm
      - name: Start services
        run: |
          docker run -d --name pekohub-test -p 3000:3000 peko/pekohub-test
          docker run -d --name mock-llm -p 8080:8080 peko/mock-llm
          sleep 5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            peko-runtime/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('peko-runtime/**/Cargo.lock') }}
      - name: Run tunnel E2E tests
        working-directory: peko-runtime
        run: cargo test --test tunnel_e2e -- --ignored
        env:
          PEKOHUB_URL: http://localhost:3000
          MOCK_LLM_URL: http://localhost:8080

  # ── Layer 4: Full E2E (nightly only) ────────────────────────────────
  full-e2e:
    name: Full Docker Compose E2E
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[e2e]')
    needs: [pekohub-integration, tunnel-integration, subagent-integration]
    steps:
      - name: Checkout peko-runtime
        uses: actions/checkout@v4
        with:
          path: peko-runtime
      - name: Checkout pekohub
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/pekohub
          path: pekohub
      - uses: docker/setup-buildx-action@v3
      - uses: dtolnay/rust-toolchain@stable
      - name: Build peko-runtime
        working-directory: peko-runtime
        run: cargo build --release
      - name: Run full E2E scenarios
        working-directory: peko-runtime/integration-tests
        run: |
          docker-compose up -d
          sleep 15
          ./run_e2e_tests.sh
