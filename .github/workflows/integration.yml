name: Integration Tests

# Three-tier CI per docs/integration/TESTING.md §9:
#   unit              every PR — fast, no Docker, no LLM
#   integration       every PR — Docker + PekoHub + mock LLM
#   integration-llm   nightly + commits tagged [llm] — adds real-LLM tests
#
# MINIMAX_API_KEY is a repo secret read ONLY by integration-llm. The
# integration job runs with the secret unset — that's how we guarantee
# mock-tier tests stay mock-only.

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Makefile'
      - '.github/docker/**'
      - '.github/workflows/integration.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Makefile'
      - '.github/docker/**'
      - '.github/workflows/integration.yml'
  schedule:
    - cron: '0 2 * * *'       # nightly integration-llm
  workflow_dispatch:          # manual force-trigger

env:
  CARGO_TERM_COLOR: always
  PEKO_IDENTITY_PASSPHRASE: ci-test-passphrase-do-not-use-in-production

jobs:
  # ── Tier 0: Unit tests (no Docker, no LLM) ──────────────────────────────
  # Linux unit tests run on every PR (fast, ~3 min). Windows unit tests
  # run ONLY when the keyword `[windows]` is in the PR title, PR body,
  # commit message, or branch name (or on the nightly schedule /
  # manual `workflow_dispatch`). This keeps CI cheap for routine PRs
  # while still catching Windows-specific regressions when someone
  # explicitly asks for it. The `unit (windows-latest)` job takes ~5
  # minutes on cold cache and is the dominant cost driver.
  #
  # Uses `Swatinem/rust-cache@v2` instead of `actions/cache@v4` because
  # the latter doesn't expand `~/.cargo/...` on Windows runners. Calls
  # `cargo test --lib` directly because Windows runner images don't
  # ship GNU make.
  unit:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    if: >-
      matrix.os != 'windows-latest'
      || github.event_name == 'schedule'
      || github.event_name == 'workflow_dispatch'
      || contains(github.event.pull_request.title, '[windows]')
      || contains(coalesce(github.event.pull_request.body, ''), '[windows]')
      || contains(github.event.head_commit.message, '[windows]')
      || contains(github.ref_name, '[windows]')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          shared-key: peko-runtime-rust
      - name: Run unit tests
        run: cargo test --lib

  # ── Tier 1: PR gate — Docker + PekoHub + mock LLM ───────────────────────
  integration:
    name: Integration (mock LLM)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - name: Checkout peko-runtime
        uses: actions/checkout@v4
        with:
          path: peko-runtime
      - name: Checkout pekohub
        # Sibling checkout so docker-compose.integration.yml's
        # `context: ../../pekohub` resolves correctly from
        # peko-runtime/tests/docker/.
        uses: actions/checkout@v4
        with:
          repository: ConekoAI/pekohub
          path: pekohub
      - uses: docker/setup-buildx-action@v3
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            peko-runtime/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('peko-runtime/**/Cargo.lock') }}
      - name: Start test stack
        working-directory: peko-runtime
        run: make docker-up
      - name: Wait for pekohub-test to become healthy
        # `make docker-up` returns when containers are created, not when
        # they're ready. PekohubBackend::start() has only 5s of grace.
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/health >/dev/null 2>&1; then
              echo "pekohub-test healthy after ${i} attempts"; exit 0
            fi
            sleep 2
          done
          echo "::error::pekohub-test failed to become healthy in 60s"
          docker ps -a
          docker logs $(docker ps -aqf "name=pekohub-test") || true
          exit 1
      - name: Run integration tests
        working-directory: peko-runtime
        # Make recipe enforces `env -u MINIMAX_API_KEY` so a leaking key
        # in the runner env can't switch dual-mode tests to the real provider.
        run: make test-integration
      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::pekohub-test logs"
          docker logs $(docker ps -aqf "name=pekohub-test") 2>&1 || true
          echo "::endgroup::"
          echo "::group::mock-llm logs"
          docker logs $(docker ps -aqf "name=mock-llm") 2>&1 || true
          echo "::endgroup::"
      - name: Tear down
        if: always()
        working-directory: peko-runtime
        run: make docker-down

  # ── Tier 2: Real-LLM tests (nightly + [llm] commit tag) ─────────────────
  integration-llm:
    name: Integration (real LLM)
    runs-on: ubuntu-latest
    needs: integration
    if: >-
      github.event_name == 'schedule'
      || github.event_name == 'workflow_dispatch'
      || contains(github.event.head_commit.message, '[llm]')
    steps:
      - name: Checkout peko-runtime
        uses: actions/checkout@v4
        with:
          path: peko-runtime
      - name: Checkout pekohub
        uses: actions/checkout@v4
        with:
          repository: ConekoAI/pekohub
          path: pekohub
      - uses: docker/setup-buildx-action@v3
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            peko-runtime/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('peko-runtime/**/Cargo.lock') }}
      - name: Start test stack
        working-directory: peko-runtime
        run: make docker-up
      - name: Wait for pekohub-test to become healthy
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/health >/dev/null 2>&1; then
              echo "pekohub-test healthy after ${i} attempts"; exit 0
            fi
            sleep 2
          done
          echo "::error::pekohub-test failed to become healthy in 60s"
          docker ps -a
          docker logs $(docker ps -aqf "name=pekohub-test") || true
          exit 1
      - name: Run real-LLM tests
        working-directory: peko-runtime
        # Make recipe enforces `env -u MOCK_LLM_URL` so dual-mode tests
        # fall through to the real provider.
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
        run: make test-integration-llm
      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::pekohub-test logs"
          docker logs $(docker ps -aqf "name=pekohub-test") 2>&1 || true
          echo "::endgroup::"
      - name: Tear down
        if: always()
        working-directory: peko-runtime
        run: make docker-down
