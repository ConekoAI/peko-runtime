name: Integration Tests

# Tiered CI per docs/integration/TESTING.md §9 and PLAN.md §7:
#
# Tier        Trigger                               Wall-clock (warm)  Notes
# ──────────── ──────────────────────────────────── ─────────────────── ─────────────────────
# smoke        every PR that touches CI-relevant    < 6 min             fmt + clippy + --lib
# lint         every PR that touches src/           < 1 min             scripts/check_*.sh
# unit-linux   every PR that triggers the workflow  ~3 min              cargo test --lib
# unit-windows `[windows]` / nightly / manual       ~5 min              gated; expensive runner
# integration  PR that touches integration paths    ~10-15 min          docker compose + PekoHub
# integration-llm `[llm]` / nightly / manual        ~5 min extra        real LLM cost
#
# Doc-only PRs (only *.md, PLAN.md, CHANGES.md, docs/**) DO NOT trigger
# this workflow at all — see the workflow-level `paths` filter below.
#
# The `changes` job uses dorny/paths-filter to decide per-job whether
# Docker-backed integration is actually needed for the PR's diff. Pure
# refactors (src/** only) skip the integration tier.
#
# MINIMAX_API_KEY is a repo secret read ONLY by integration-llm. The
# integration job runs with the secret unset — that's how we guarantee
# mock-tier tests stay mock-only.

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Makefile'
      - 'clippy.toml'
      - '.github/docker/**'
      - 'scripts/check_*.sh'
      - 'scripts/check_*.ps1'
      - '.github/workflows/integration.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Makefile'
      - 'clippy.toml'
      - '.github/docker/**'
      - 'scripts/check_*.sh'
      - 'scripts/check_*.ps1'
      - '.github/workflows/integration.yml'
  schedule:
    - cron: '0 2 * * *'       # nightly integration-llm
  workflow_dispatch:          # manual force-trigger

env:
  CARGO_TERM_COLOR: always
  PEKO_IDENTITY_PASSPHRASE: ci-test-passphrase-do-not-use-in-production
  PEKO_MASTER_PASSPHRASE: ci-test-passphrase-do-not-use-in-production

jobs:
  # ── Path-aware change detector ────────────────────────────────────────
  # Output keys:
  #   src            — src/** changed
  #   tests          — tests/** changed
  #   docker         — .github/docker/** changed
  #   dockerfile     — Dockerfile* / docker-compose*.yml changed
  #   workflow       — this file changed
  #   windows_code   — windows-specific code paths changed
  # Always runs on any trigger so downstream jobs can branch on its outputs.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      tests: ${{ steps.filter.outputs.tests }}
      docker: ${{ steps.filter.outputs.docker }}
      dockerfile: ${{ steps.filter.outputs.dockerfile }}
      workflow: ${{ steps.filter.outputs.workflow }}
      windows_code: ${{ steps.filter.outputs.windows_code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
            tests:
              - 'tests/**'
            docker:
              - '.github/docker/**'
            dockerfile:
              - 'Dockerfile*'
              - 'docker-compose*.yml'
              - 'tests/docker/**'
            workflow:
              - '.github/workflows/integration.yml'
            windows_code:
              - 'src/common/process/**'
              - 'src/ipc/pipe_security.rs'
              - 'tests/common/cli.rs'

  # ── Tier 0a: Smoke — fmt + clippy + lib tests, every PR ──────────────
  # `cargo fmt --check` is `continue-on-error: true` for now because
  # master has ~494 files with accumulated fmt diffs that pre-date
  # this refactor. The smoke job still runs fmt and reports the diff
  # to the PR; promote to a hard gate once a one-time `cargo fmt`
  # sweep lands (tracked as a follow-up to PLAN.md).
  smoke:
    name: Smoke (fmt + clippy + lib)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.tests == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          shared-key: peko-runtime-rust
      - name: cargo fmt --check (advisory)
        continue-on-error: true
        run: cargo fmt --all -- --check
      - name: cargo clippy --all-targets
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test --lib
        run: cargo test --lib

  # ── Tier 0b: Lint — Issue-015 boundary rules, every PR ───────────────
  # ADVISORY for now: scripts/check_module_boundaries.sh reports known
  # pre-existing violations (see PLAN.md Horizon B backlog — moving
  # adapters/validation.rs imports out of the framework). The job is
  # wired up so the rule is visible on every PR and regressions trip it,
  # but `continue-on-error` keeps the existing violations from blocking
  # the refactor. Promote to a hard gate once Horizon B clears them.
  lint:
    name: Lint (module boundaries)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.src == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run boundary check
        run: bash scripts/check_module_boundaries.sh

  # ── Tier 0c: Linux unit tests, every PR ───────────────────────────────
  # Always on warm cache ~3 min. `Swatinem/rust-cache@v2` is used because
  # `actions/cache@v4` doesn't expand `~/.cargo/...` on Windows runners;
  # we standardize on it across all jobs for cache-hit consistency.
  unit-linux:
    name: Unit Tests (ubuntu-latest)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.tests == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          shared-key: peko-runtime-rust
      - name: Run unit tests
        run: cargo test --lib

  # ── Tier 0d: Windows unit tests, gated ───────────────────────────────
  # Gates (existing):
  #   - `[windows]` in PR title, body, commit message, or branch name
  #   - nightly schedule
  #   - manual workflow_dispatch
  # Additionally gate on changes to Windows-specific code paths so a
  # Linux-only refactor doesn't accidentally trigger this expensive job.
  unit-windows:
    name: Unit Tests (windows-latest)
    runs-on: windows-latest
    needs: changes
    if: >-
      (needs.changes.outputs.windows_code == 'true'
       || github.event_name == 'schedule'
       || github.event_name == 'workflow_dispatch'
       || contains(github.event.head_commit.message, '[windows]')
       || contains(github.ref_name, '[windows]')
       || startsWith(github.ref_name, 'windows/'))
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          shared-key: peko-runtime-rust
      - name: Run unit tests
        # Windows runner images don't ship GNU make, so call cargo
        # directly instead of `make test`.
        run: cargo test --lib

  # ── Tier 1: PR gate — Docker + PekoHub + mock LLM ─────────────────────
  # Path-aware gate: only run when src/, tests/, Cargo.*, Makefile, or
  # Docker assets changed. Pure refactors (src/** only) skip this tier
  # but still run smoke + lint + unit-linux.
  integration:
    name: Integration (mock LLM)
    runs-on: ubuntu-latest
    needs: [changes, unit-linux]
    if: >-
      (needs.changes.outputs.tests == 'true'
       || needs.changes.outputs.docker == 'true'
       || needs.changes.outputs.dockerfile == 'true'
       || needs.changes.outputs.workflow == 'true'
       || github.event_name == 'schedule'
       || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout peko-runtime
        uses: actions/checkout@v4
        with:
          path: peko-runtime
      - name: Checkout pekohub
        # Sibling checkout so docker-compose.integration.yml's
        # `context: ../../pekohub` resolves correctly from
        # peko-runtime/tests/docker/.
        uses: actions/checkout@v4
        with:
          repository: ConekoAI/pekohub
          path: pekohub
      - uses: docker/setup-buildx-action@v3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: peko-runtime
          shared-key: peko-runtime-rust
      - name: Start test stack
        working-directory: peko-runtime
        run: make docker-up
      - name: Wait for pekohub-test to become healthy
        # `make docker-up` returns when containers are created, not when
        # they're ready. PekohubBackend::start() has only 5s of grace.
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/health >/dev/null 2>&1; then
              echo "pekohub-test healthy after ${i} attempts"; exit 0
            fi
            sleep 2
          done
          echo "::error::pekohub-test failed to become healthy in 60s"
          docker ps -a
          docker logs $(docker ps -aqf "name=pekohub-test") || true
          exit 1
      - name: Run integration tests
        working-directory: peko-runtime
        # Make recipe enforces `env -u MINIMAX_API_KEY` so a leaking key
        # in the runner env can't switch dual-mode tests to the real provider.
        run: make test-integration
      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::pekohub-test logs"
          docker logs $(docker ps -aqf "name=pekohub-test") 2>&1 || true
          echo "::endgroup::"
          echo "::group::mock-llm logs"
          docker logs $(docker ps -aqf "name=mock-llm") 2>&1 || true
          echo "::endgroup::"
      - name: Tear down
        if: always()
        working-directory: peko-runtime
        run: make docker-down

  # ── Tier 2: Real-LLM tests (nightly + [llm] commit tag) ───────────────
  # Path-aware gate: only run when the diff could plausibly affect
  # provider/CLI plumbing, plus the existing event/schedule/manual gates.
  integration-llm:
    name: Integration (real LLM)
    runs-on: ubuntu-latest
    needs: [changes, integration]
    if: >-
      (needs.changes.outputs.src == 'true'
       || needs.changes.outputs.tests == 'true'
       || needs.changes.outputs.workflow == 'true')
      && (github.event_name == 'schedule'
          || github.event_name == 'workflow_dispatch'
          || contains(github.event.head_commit.message, '[llm]'))
    steps:
      - name: Checkout peko-runtime
        uses: actions/checkout@v4
        with:
          path: peko-runtime
      - name: Checkout pekohub
        uses: actions/checkout@v4
        with:
          repository: ConekoAI/pekohub
          path: pekohub
      - uses: docker/setup-buildx-action@v3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: peko-runtime
          shared-key: peko-runtime-rust
      - name: Start test stack
        working-directory: peko-runtime
        run: make docker-up
      - name: Wait for pekohub-test to become healthy
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/health >/dev/null 2>&1; then
              echo "pekohub-test healthy after ${i} attempts"; exit 0
            fi
            sleep 2
          done
          echo "::error::pekohub-test failed to become healthy in 60s"
          docker ps -a
          docker logs $(docker ps -aqf "name=pekohub-test") || true
          exit 1
      - name: Run real-LLM tests
        working-directory: peko-runtime
        # Make recipe enforces `env -u MOCK_LLM_URL` so dual-mode tests
        # fall through to the real provider.
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
        run: make test-integration-llm
      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::pekohub-test logs"
          docker logs $(docker ps -aqf "name=pekohub-test") 2>&1 || true
          echo "::endgroup::"
      - name: Tear down
        if: always()
        working-directory: peko-runtime
        run: make docker-down
